# ============================================================
# Chronopoli – Nginx Reverse Proxy for Extension Services
# Install: sudo cp extensions.conf /etc/nginx/sites-available/chronopoli-extensions.conf
#          sudo ln -s /etc/nginx/sites-available/chronopoli-extensions.conf /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# SSL: Use certbot to get certs before enabling:
#   sudo certbot certonly --nginx -d video.chronopoli.io -d slides.chronopoli.io
# ============================================================

# Opencast – Video Management
server {
    listen 443 ssl;
    server_name video.chronopoli.io;

    ssl_certificate     /etc/letsencrypt/live/chronopoli.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chronopoli.io/privkey.pem;

    # Large video uploads (up to 20GB)
    client_max_body_size 20G;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_buffering    off;
    }
}

# HTTP → HTTPS redirect for video
server {
    listen 80;
    server_name video.chronopoli.io;
    return 301 https://$host$request_uri;
}

# Presenton – AI Slide Builder (staff-only)
server {
    listen 443 ssl;
    server_name slides.chronopoli.io;

    ssl_certificate     /etc/letsencrypt/live/chronopoli.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chronopoli.io/privkey.pem;

    # Restrict to staff — basic auth (Phase 1)
    # Phase 2: replace with OpenEdX OAuth proxy
    auth_basic           "Chronopoli Staff Only";
    auth_basic_user_file /etc/nginx/.presenton_htpasswd;

    location / {
        proxy_pass         http://127.0.0.1:5050;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}

# HTTP → HTTPS redirect for slides
server {
    listen 80;
    server_name slides.chronopoli.io;
    return 301 https://$host$request_uri;
}
